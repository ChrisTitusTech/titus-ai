[projects."/home/titus/github/myheroultra"]
trust_level = "trusted"

[projects."/home/titus/github/titus-ai"]
trust_level = "trusted"

[projects."/home/titus/.codex"]
trust_level = "trusted"

[projects."/home/titus/github/linutil"]
trust_level = "trusted"

[projects."/home/titus/github/website"]
trust_level = "trusted"

[projects."/home/titus/github/dwm-titus"]
